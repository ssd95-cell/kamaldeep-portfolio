<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamaldeep Singh — BIM Coordinator</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#1A2E44;
  --cream:#F7F4EF;
  --accent:#C8A96E;
  --text:#1C1C1C;
  --muted:#6B7280;
}

body {
  font-family:'DM Sans',sans-serif;
  margin:0;
  background:var(--cream);
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  background:white;
  z-index:100;
}

/* HERO */
#home {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--navy);
  color:white;
  text-align:center;
}

.hero-name {
  font-family:'DM Serif Display';
  font-size:3rem;
}

/* PROJECTS */
#projects {
  padding:5rem 2rem;
  background:var(--navy);
}

.projects-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.5rem;
}

.project-card {
  background:rgba(255,255,255,0.05);
  padding:1rem;
  transition:0.3s;
}

.project-card:hover {
  transform:translateY(-5px);
}

.project-card img {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  margin-bottom:1rem;
}

.project-title {
  color:white;
  font-family:'DM Serif Display';
}

.project-desc {
  color:#ccc;
  font-size:0.9rem;
}

.project-tool {
  color:var(--accent);
  font-size:0.7rem;
  border:1px solid var(--accent);
  padding:3px 6px;
  display:inline-block;
  margin-top:5px;
}
</style>
</head>

<body>

<nav>
  <div>KS</div>
</nav>

<section id="home">
  <div>
    <h1 class="hero-name">Kamaldeep Singh</h1>
    <p>BIM Coordinator | Project Manager</p>
  </div>
</section>

<section id="projects">
  <h2 style="color:white;">BIM Portfolio</h2>
  <div class="projects-grid"></div>
</section>

<script>

/* =========================
   🔥 EDIT EVERYTHING HERE
   ========================= */

const projects = [
  {
    title: "Institutional MEP Modelling",
    image: "images/mep_school.png",
    desc: "Designed HVAC, Electrical, and Plumbing systems for a 70,951 sqft school. Resolved routing conflicts.",
    tool: "Revit"
  },
  {
    title: "14-Storey Structural Design",
    image: "images/structural_modelling.png",
    desc: "Full structural modelling including foundations and steel framing.",
    tool: "Revit"
  },
  {
    title: "Civil 3D Land Development",
    image: "images/civil_development.png",
    desc: "Created road networks and sewer systems using Civil 3D.",
    tool: "Civil 3D"
  }
];

/* =========================
   ⚙️ DO NOT TOUCH BELOW
   ========================= */

const grid = document.querySelector(".projects-grid");

projects.forEach(p => {
  grid.innerHTML += `
    <div class="project-card">
      <img src="${p.image}" alt="${p.title}">
      <h3 class="project-title">${p.title}</h3>
      <p class="project-desc">${p.desc}</p>
      <span class="project-tool">${p.tool}</span>
    </div>
  `;
});

</script>

</body>
</html>
